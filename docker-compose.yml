version: '3'

volumes:
  odtileslog:
  apachelog:


services:
  base:
    build:
      context: base/
      dockerfile: Dockerfile
      args:
        - URL=${URL}
        - ALLOWED_HOSTS=${ALLOWED_HOSTS}
        - UWSGI_WORKERS=${UWSGI_WORKERS}
        - UWSGI_PORT=${UWSGI_PORT}
        - MAX_AGE=${MAX_AGE}
        - MAX_AGE_LIVE=${MAX_AGE_LIVE}
    volumes:
      - ${TILE_SOURCE_FOLDER}:/mnt/odtiles/tilesrc
      - ${TILE_OUTPUT_FOLDER}:/mnt/odtiles/tileout
      - ${WMS_OUTPUT_FOLDER}:/mnt/odtiles/wmsout
      - odtileslog:/opt/odtiles/logs/
      - apachelog:/usr/local/apache2/logs/
    restart: always

  httpd:
    build:
      context: httpd/
      dockerfile: Dockerfile
      args:
        - SERVER_NAME=${SERVER_NAME}
        - SERVER_ADMIN=${SERVER_ADMIN}
        - UWSGI_PORT=${UWSGI_PORT}
    volumes:
      - apachelog:/usr/local/apache2/logs/
    ports:
      - "80:80"
      - "443:443"
    restart: always
